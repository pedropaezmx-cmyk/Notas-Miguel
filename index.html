<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nota de Artículos</title>
<style>
:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --surface2: #F0EEE9;
  --border: #E0DDD6;
  --border2: #C8C4BB;
  --text: #1A1917;
  --text2: #6B6860;
  --text3: #A09D98;
  --accent: #1A5C96;
  --accent-light: #E8F0F9;
  --accent-hover: #134878;
  --green: #2E6B18;
  --green-light: #EAF3E1;
  --red: #992B2B;
  --red-light: #FBE9E9;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --nav-h: 60px;
  --header-h: 52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  overflow-x:hidden;
}

/* ── HEADER ── */
.app-header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.app-header h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;flex-shrink:0}
.header-date{font-size:11px;color:var(--text3)}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:var(--nav-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;cursor:pointer;
  color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;padding:6px 4px;transition:color .15s;
  font-family:inherit;
}
.nav-btn svg{width:20px;height:20px;transition:color .15s}
.nav-btn.active{color:var(--accent)}
.nav-badge{
  position:absolute;top:6px;
  background:var(--accent);color:#fff;
  border-radius:20px;font-size:9px;font-weight:700;
  padding:1px 5px;min-width:16px;text-align:center;
  margin-left:14px;
}

/* ── MAIN SCROLL AREA ── */
.app-body{
  margin-top:var(--header-h);
  margin-bottom:var(--nav-h);
  padding:8px 8px 12px;
  min-height:calc(100vh - var(--header-h) - var(--nav-h));
}

/* ── STATS BAR ── */
.stats-bar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:12px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:8px 10px;
  display:flex;flex-direction:column;gap:2px;
  box-shadow:var(--shadow);
}
.stat-label{font-size:10px;color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-value{font-size:16px;font-weight:700;color:var(--accent);line-height:1.1}

/* ── PANES ── */
.pane{display:none}
.pane.active{display:block}

/* ── DESKTOP: side-by-side grid (≥700px) ── */
@media(min-width:700px){
  .app-header{padding:0 24px}
  .app-body{padding:20px 24px 24px;max-width:1100px;margin-left:auto;margin-right:auto}
  .bottom-nav{display:none}
  .desktop-tabs{display:flex!important}
  .stats-bar{grid-template-columns:repeat(3,auto);justify-content:flex-start}
  .stat-card{flex-direction:row;align-items:center;gap:10px;padding:10px 18px}
  .stat-value{font-size:18px}
  .panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .art-list{height:292px}
  .nota-cards{display:none!important}
  .nota-table-wrap{display:block!important}
  .nota-scroll{max-height:340px;overflow-y:auto}
}

/* ── DESKTOP TABS (hidden on mobile) ── */
.desktop-tabs{
  display:none;
  gap:4px;
  margin-bottom:14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:4px;
  width:fit-content;
}
.dtab{
  padding:6px 18px;border-radius:6px;border:none;
  background:transparent;color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;
  white-space:nowrap;font-family:inherit;
}
.dtab:hover{background:var(--surface);color:var(--text)}
.dtab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
.dbadge{
  background:var(--accent);color:#fff;border-radius:20px;
  font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;
}

/* ── PANEL ── */
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:14px;
  box-shadow:var(--shadow);
  margin-bottom:12px;
}
.panel:last-child{margin-bottom:0}
.panel-title{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:5px;
}
.panel-title svg{width:13px;height:13px;flex-shrink:0}

/* ── INPUTS ── */
input[type=text]{
  width:100%;padding:9px 11px;
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:14px;background:var(--surface);color:var(--text);
  transition:border-color .15s,box-shadow .15s;font-family:inherit;
  -webkit-appearance:none;
}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,150,.12)}
label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);display:block;margin-bottom:5px}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:10px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none}
.search-wrap input{padding-left:32px}

/* ── ARTICLE LIST ── */
.art-list{
  height:135px; /* compact on mobile ~3/4 */
  overflow-y:auto;
  border:1px solid var(--border);
  border-radius:var(--radius);
  scroll-behavior:smooth;
}
.art-list::-webkit-scrollbar{width:3px}
.art-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.art-item{
  padding:9px 12px;cursor:pointer;font-size:13px;
  border-bottom:1px solid var(--border);transition:background .1s;
  display:flex;align-items:center;gap:8px;color:var(--text);
  min-height:42px;
}
.art-item:last-child{border-bottom:none}
.art-item:hover,.art-item:active{background:var(--surface2)}
.art-item.selected{background:var(--accent-light);color:var(--accent);font-weight:600}
.art-item svg{width:13px;height:13px;flex-shrink:0;opacity:.4}
.art-item.selected svg{opacity:1}
.art-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.art-count{font-size:11px;color:var(--text3);margin-top:5px}

/* ── SEL DISPLAY ── */
.sel-display{
  padding:9px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);font-size:13px;font-weight:600;
  min-height:36px;color:var(--text);margin-bottom:12px;line-height:1.4;
  transition:background .2s,color .2s,border-color .2s;
}
.sel-display.empty{color:var(--text3);font-weight:400}
.sel-display.selected{background:#EAF3E1;border-color:#7dba5a;color:#1f5c0a;font-weight:700}

/* ── TALLAS ── */
.tallas{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.talla-box{
  flex:1;min-width:44px;max-width:70px;
  display:flex;align-items:center;justify-content:center;
  height:40px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;font-weight:700;cursor:pointer;user-select:none;
  transition:all .15s;color:var(--text2);background:var(--surface);
}
.talla-box:hover,.talla-box:active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.talla-box.sel{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(26,92,150,.3)}

/* ── FIELDS ROW ── */
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ── SUBTOTAL ── */
.subtotal-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:12px;
}
.sub-label{font-size:12px;color:var(--text2);font-weight:600}
.sub-val{font-size:17px;font-weight:800;color:var(--accent)}

/* ── BUTTONS ── */
.btn{
  cursor:pointer;padding:9px 14px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:13px;font-weight:600;transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;font-family:inherit;line-height:1;
}
.btn svg{width:14px;height:14px}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:var(--accent);color:#fff;border-color:var(--accent);
  width:100%;justify-content:center;padding:12px;font-size:15px;
}
.btn-primary:hover{background:var(--accent-hover)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#245414}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-icon{padding:6px 9px}
.actions-row{display:flex;gap:6px;flex-wrap:wrap}

/* ── MSG ── */
.msg{padding:8px 11px;border-radius:var(--radius);font-size:12px;margin-top:10px;display:none;font-weight:600}
.msg.ok{background:var(--green-light);color:var(--green);border:1px solid #c2e0ae}
.msg.err{background:var(--red-light);color:var(--red);border:1px solid #f2bebe}

/* ── NOTA: mobile cards ── */
.nota-cards{display:block}
.nota-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;
  box-shadow:var(--shadow);
}
.nota-card:last-child{margin-bottom:0}
.nc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.nc-name{font-size:13px;font-weight:600;line-height:1.3;flex:1}
.nc-tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent);white-space:nowrap}
.nc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.nc-field label{font-size:10px;color:var(--text3);margin-bottom:2px}
.nc-actions{display:flex;gap:6px;justify-content:flex-end}
.nc-subtotal{font-size:14px;font-weight:800;color:var(--accent)}

/* ── NOTA: desktop table (hidden on mobile) ── */
.nota-table-wrap{display:none}
.nota-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;min-width:520px}
.nota-table th{text-align:left;padding:7px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-bottom:1px solid var(--border)}
.nota-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.nota-table tbody tr:last-child td{border-bottom:none}
.nota-table tbody tr:hover td{background:var(--surface2)}
.nota-scroll{overflow-x:auto}
.nota-scroll::-webkit-scrollbar{height:3px}
.nota-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.edit-input{
  width:100%;padding:5px 7px;border:1px solid var(--border);
  border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);font-family:inherit;
}
.edit-input:focus{outline:none;border-color:var(--accent)}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--accent-light);color:var(--accent)}

.nota-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;margin-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;gap:6px;
}
.nota-footer .piezas{font-size:12px;color:var(--text2)}
.nota-footer .total-big{font-size:18px;font-weight:800;color:var(--accent)}

.empty-state{padding:32px 16px;text-align:center;color:var(--text3)}
.empty-state svg{width:36px;height:36px;margin:0 auto 8px;display:block;opacity:.35}
.empty-state p{font-size:13px;line-height:1.6}

/* ── CSV BOX ── */
.csv-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin-top:12px;display:none;
  box-shadow:var(--shadow);
}
.csv-box textarea{
  width:100%;height:110px;font-family:'Courier New',monospace;font-size:10px;
  padding:8px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surface2);color:var(--text);resize:none;margin-top:8px;
}
.csv-hint{font-size:11px;color:var(--text3);margin-top:6px}
.csv-header{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;
  transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--text);color:#fff;padding:9px 20px;border-radius:20px;
  font-size:13px;font-weight:600;box-shadow:var(--shadow-md);
  transition:transform .2s ease,opacity .2s ease;z-index:999;white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
@media(min-width:700px){.toast{bottom:16px}}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <h1><span class="dot"></span> Nota de Artículos</h1>
  <span class="header-date" id="fecha-header"></span>
</header>

<!-- Body -->
<div class="app-body">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Artículos</div>
      <div class="stat-value" id="cnt-items">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Piezas</div>
      <div class="stat-value" id="cnt-piezas">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="total-header">$0</div>
    </div>
  </div>

  <!-- Desktop tabs -->
  <div class="desktop-tabs" id="desktop-tabs">
    <button class="dtab active" onclick="switchTab('agregar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar artículo
    </button>
    <button class="dtab" onclick="switchTab('nota')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Ver nota <span class="dbadge" id="badge-cnt">0</span>
    </button>
  </div>

  <!-- PANE AGREGAR -->
  <div class="pane active" id="pane-agregar">
    <div class="panel-grid" id="panel-grid">

      <!-- Selección -->
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Seleccionar artículo
        </div>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="filtro" placeholder="Buscar..." oninput="filtrar()" autocomplete="off">
        </div>
        <div class="art-list" id="art-list"></div>
        <p class="art-count" id="art-count"></p>
      </div>

      <!-- Detalle -->
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Detalle
        </div>

        <label>Artículo</label>
        <div class="sel-display empty" id="art-sel-label">— Ninguno seleccionado —</div>

        <label style="margin-bottom:8px">Talla</label>
        <div class="tallas">
          <div class="talla-box" onclick="selTalla(this,'CH')">CH</div>
          <div class="talla-box" onclick="selTalla(this,'M')">M</div>
          <div class="talla-box" onclick="selTalla(this,'G')">G</div>
          <div class="talla-box" onclick="selTalla(this,'XX')">XX</div>
          <div class="talla-box" onclick="selTalla(this,'XXX')">XXX</div>
        </div>

        <div class="fields-row">
          <div>
            <label>Cantidad</label>
            <input type="text" id="cantidad" placeholder="0" oninput="fmtCantidad(this);calcSub()" inputmode="numeric">
          </div>
          <div>
            <label>Precio unit.</label>
            <input type="text" id="precio" placeholder="0.00" oninput="fmtPrecio(this);calcSub()" inputmode="decimal">
          </div>
        </div>

        <div class="subtotal-row">
          <span class="sub-label">Subtotal</span>
          <span class="sub-val" id="subtotal-prev">$0.00</span>
        </div>

        <button class="btn btn-primary" onclick="agregarItem()" id="btn-agregar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar a la nota
        </button>
        <div class="msg" id="msg"></div>
      </div>
    </div>
  </div>

  <!-- PANE NOTA -->
  <div class="pane" id="pane-nota">
    <!-- Acciones de nota -->
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="switchTab('agregar')" style="gap:5px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Editar nota
      </button>
      <button class="btn btn-sm" onclick="nuevaNota()" style="gap:5px;color:var(--red);border-color:var(--red)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nueva nota
      </button>
    </div>
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <div class="panel-title" style="margin:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Artículos en la nota
        </div>
        <div class="actions-row">
          <button class="btn btn-green btn-sm" onclick="exportarCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV
          </button>
          <button class="btn btn-sm" onclick="compartirNota()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Compartir
          </button>
          <button class="btn btn-sm" onclick="imprimirNota()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Imprimir
          </button>
        </div>
      </div>

      <!-- Mobile: cards -->
      <div class="nota-cards" id="nota-cards"></div>

      <!-- Desktop: table -->
      <div class="nota-table-wrap">
        <div class="nota-scroll">
          <table class="nota-table">
            <colgroup><col style="width:28px"><col><col style="width:52px"><col style="width:76px"><col style="width:86px"><col style="width:86px"><col style="width:64px"></colgroup>
            <thead><tr><th>#</th><th>Artículo</th><th>Talla</th><th>Cant.</th><th>Precio</th><th>Subtotal</th><th></th></tr></thead>
            <tbody id="nota-body"></tbody>
          </table>
        </div>
      </div>

      <div class="empty-state" id="nota-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Aún no hay artículos.<br>Ve a <strong>Agregar</strong> para empezar.</p>
      </div>

      <div class="nota-footer">
        <span class="piezas">Piezas: <strong id="total-piezas">0</strong></span>
        <span class="total-big" id="total-nota">$0.00</span>
      </div>
    </div>

    <!-- CSV box -->
    <div class="csv-box" id="csv-share-box">
      <div class="csv-header">
        <div class="panel-title" style="margin:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          CSV listo
        </div>
        <button class="btn btn-sm" onclick="copiarCSV()" id="btn-copiar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar
        </button>
      </div>
      <textarea id="csv-preview" readonly></textarea>
      <p class="csv-hint">Pega en Excel o Google Sheets.</p>
    </div>
  </div>

</div><!-- /app-body -->

<!-- Bottom nav (mobile only) -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-agregar" onclick="switchTab('agregar')" style="position:relative">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Agregar
  </button>
  <button class="nav-btn" id="nav-nota" onclick="switchTab('nota')" style="position:relative">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Ver nota
    <span class="nav-badge" id="nav-badge" style="display:none">0</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const ARTICULOS=["CAMISA CORTA COYOTE XXX","CAMISA CORTA KAKI XXX","CAMISA CORTA NEGRA XXX","CAMISA DEPORTIVA","CAMISA MANGA CORTA","CAMISA MANGA CORTA MUJER","CAMISA POLO LARGA","CAMISA RAPIDA ALGODON Y MAYA","CAMISA RAPIDA CON MAYA","CAMISA RAPIDA CON MAYA MANGA CORTA","CAMISA RAPIDA DE LICRA","CAMISA RAPIDA DRY FIT CUELLO MAO","CAMISA RAPIDA NACIONAL","CAMISA RAPIDA PIXEL","CAMISA RAPIDA SIN MAYA MANGA CORTA","CAMISA TIPO POLO LICRA MANGA CORTA","CAMISA TIPO POLO LICRA MANGA LARGA","CAMISOLA","CAMISOLA GRANO DE POLVORA","CAMISOLA RIPSTOP","CAMISOLA RIPSTOP BLANCA","CHAL.CORTE LASER","CHALECO BULL DOBLE LIBERACION PARA PLACA Y 6 COMPARTIMIENTOS TAURUS","CHALECO CON DOBLE LIBERACION Y PORTA CARGADORES CON PANEL ENFRENTE TACBUL ELITE TAURUS","CHALECO CON PORTA FUSIL PARACORD","CHALECO CON RECU Y BOLSAS","CHALECO CON RECU Y CARGADORES","CHALECO CORTE LASER ECONOMICO","CHALECO DOBLE LIBERACION PARA 6 CARGADORES LARGA Y CORTA CORTE LASER REALZADO","CHALECO FEDERAL","CHALECO HILO BLANCO SIRA CAMEL","CHALECO KAKI C/CARGADORES Y BONGI","CHALECO KAKI CON CARGADORES","CHALECO LIB.RAP. DOBLE C/LASER CON PORTA CARGADORES ARMA CORTA Y LARGA","CHALECO LIBER. RAPIDA DOBLE C/LASER Y CARGADORES PARA ARMA LARGA","CHALECO LIBER. RAPIDA DOBLE CON PORTA CARGADORES ENFRENTE BOLSA Y PORTA ESPOSAS AL LADO","CHALECO LIBER/RAPIDA ABAJO CON CARGADORES CON TAPA EN FRENTE Y PORTA CARGADORES AL LADO PARA ARMA LARGA","CHALECO LIBERACION RAPIDA DOBLE CORTE LASER VANQUISH","CHALECO PIXI VERDE CON CARGADO","CHALECO PORTA ARMA","CHALECO PORTA PLACA C/DOBLE LIBERACION CORTE LASER CON BOLSA ENFRENTE DE VINIPIEL PARA 3 CARGADORES ARMA LARGA","CHALECO PORTA PLACA LIBERACION DOBLE PARA 6 CARGADORES CORTA Y LARGA PORTA ESPOSAS Y BOLSA AL LADO","PANTA DELTA","PANTALON AVIADOR","PANTALON AVIADOR RIPSTOP TELA IMPORTADA","PANTALON AVIADOR STRECH REPELENTE","PANTALON CON REFLEJANTE","PANTALON DE CARGO","PANTALON DE CARGO RIPSTOP IMPORTADO","PANTALON DELTA","PANTALON NICK HANDEL","PANTALON STRAIGHT","PANTALÓN GRANO DE POLVORA","PANTALÓN PIXEL","POLO PARA MUJER MANGA LARGA","Prod. Prueba","SUDADERA TACTICA"];

let nota=[],artSeleccionado=null,tallaSeleccionada=null,editId=null;

// Precio recordado por artículo (persiste entre sesiones)
const PRECIO_KEY='nota_precios_v1';
function cargarPrecios(){try{return JSON.parse(localStorage.getItem(PRECIO_KEY))||{};}catch{return {};}}
function guardarPrecio(articulo,precio){
  const mapa=cargarPrecios();
  mapa[articulo]=precio;
  try{localStorage.setItem(PRECIO_KEY,JSON.stringify(mapa));}catch{}
}

const fmt=n=>n.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtInt=n=>n.toLocaleString('es-MX');
const parseFmt=s=>parseFloat((s||'').replace(/,/g,''))||0;

function fmtPrecio(el){
  let raw=el.value.replace(/[^0-9.]/g,'');
  const parts=raw.split('.');
  if(parts.length>2)raw=parts[0]+'.'+parts.slice(1).join('');
  const ip=(parts[0]||'').replace(/\B(?=(\d{3})+(?!\d))/g,',');
  el.value=parts.length>1?ip+'.'+parts[1]:ip;
}
function fmtCantidad(el){
  let raw=el.value.replace(/[^0-9]/g,'');
  el.value=raw?parseInt(raw).toLocaleString('es-MX'):'';
}
function calcSub(){
  const q=parseFmt(document.getElementById('cantidad').value);
  const p=parseFmt(document.getElementById('precio').value);
  document.getElementById('subtotal-prev').textContent='$'+fmt(q*p);
}

const d=new Date();
const fechaStr=d.toLocaleDateString('es-MX',{weekday:'short',year:'numeric',month:'short',day:'numeric'});
document.getElementById('fecha-header').textContent=fechaStr;

function filtrar(){renderList(document.getElementById('filtro').value.toLowerCase());}
function renderList(q=''){
  const ul=document.getElementById('art-list');
  const filtered=ARTICULOS.filter(a=>a.toLowerCase().includes(q));
  ul.innerHTML=filtered.map(a=>{
    const esc=a.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="art-item${artSeleccionado===a?' selected':''}" onclick="selArt(this,'${esc}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H5v10a2 2 0 002 2h10a2 2 0 002-2V10h1.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg>
      <span>${a}</span>
    </div>`;
  }).join('');
  document.getElementById('art-count').textContent=`${filtered.length} de ${ARTICULOS.length}`;
}

function selArt(el,nombre){
  artSeleccionado=nombre;
  const lbl=document.getElementById('art-sel-label');
  lbl.textContent=nombre;lbl.classList.remove('empty');lbl.classList.add('selected');
  document.querySelectorAll('.art-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  tallaSeleccionada=null;
  document.querySelectorAll('.talla-box').forEach(b=>b.classList.remove('sel'));
  document.getElementById('cantidad').value='';
  // Cargar precio recordado
  const precios=cargarPrecios();
  const precioRecordado=precios[nombre];
  const camPrecio=document.getElementById('precio');
  if(precioRecordado){
    camPrecio.value=fmt(precioRecordado);
    calcSub();
    showMsg('Precio recordado: $'+fmt(precioRecordado),'ok');
  } else {
    camPrecio.value='';
    document.getElementById('subtotal-prev').textContent='$0.00';
    showMsg('','');
  }
  editId=null;
  setBtnAgregar();
}
function setBtnAgregar(){
  document.getElementById('btn-agregar').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Agregar a la nota';
}
function selTalla(el,t){
  tallaSeleccionada=t;
  document.querySelectorAll('.talla-box').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}
function showMsg(txt,tipo){
  const el=document.getElementById('msg');
  el.textContent=txt;el.className='msg'+(tipo?' '+tipo:'');el.style.display=txt?'block':'none';
}
let toastTimer;
function toast(txt){
  const el=document.getElementById('toast');
  el.textContent=txt;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

function agregarItem(){
  if(!artSeleccionado){showMsg('Selecciona un artículo','err');return;}
  if(!tallaSeleccionada){showMsg('Selecciona una talla','err');return;}
  const cant=parseFmt(document.getElementById('cantidad').value);
  const precio=parseFmt(document.getElementById('precio').value);
  if(!cant||cant<1){showMsg('Ingresa una cantidad válida','err');return;}
  if(!precio||precio<=0){showMsg('Ingresa un precio válido','err');return;}
  // Guardar precio en memoria para este artículo
  guardarPrecio(artSeleccionado,precio);
  if(editId!==null){
    const idx=nota.findIndex(i=>i.id===editId);
    if(idx>-1)nota[idx]={...nota[idx],articulo:artSeleccionado,talla:tallaSeleccionada,cantidad:cant,precio,subtotal:cant*precio};
    editId=null;setBtnAgregar();toast('✓ Artículo actualizado');
  } else {
    nota.push({id:Date.now(),articulo:artSeleccionado,talla:tallaSeleccionada,cantidad:cant,precio,subtotal:cant*precio});
    toast('✓ Agregado a la nota');
  }
  showMsg('','');updateTotales();
  document.getElementById('csv-share-box').style.display='none';
}

function updateTotales(){
  const total=nota.reduce((s,i)=>s+i.subtotal,0);
  const piezas=nota.reduce((s,i)=>s+i.cantidad,0);
  document.getElementById('cnt-items').textContent=nota.length;
  document.getElementById('total-header').textContent='$'+fmt(total);
  document.getElementById('badge-cnt').textContent=nota.length;
  document.getElementById('total-nota').textContent='$'+fmt(total);
  document.getElementById('total-piezas').textContent=fmtInt(piezas);
  document.getElementById('cnt-piezas').textContent=fmtInt(piezas);
  const nb=document.getElementById('nav-badge');
  nb.textContent=nota.length;nb.style.display=nota.length?'block':'none';
}

function renderNota(){
  const empty=document.getElementById('nota-empty');
  if(!nota.length){
    document.getElementById('nota-cards').innerHTML='';
    document.getElementById('nota-body').innerHTML='';
    empty.style.display='block';return;
  }
  empty.style.display='none';
  // Mobile cards
  document.getElementById('nota-cards').innerHTML=nota.map((item,i)=>`
    <div class="nota-card">
      <div class="nc-top">
        <div class="nc-name">${i+1}. ${item.articulo}</div>
        <span class="nc-tag">${item.talla}</span>
      </div>
      <div class="nc-row">
        <div class="nc-field">
          <label>Cantidad</label>
          <input class="edit-input" type="text" value="${fmtInt(item.cantidad)}" inputmode="numeric"
            oninput="fmtEditCant(this)" onchange="editCampo(${item.id},'cantidad',this.value)">
        </div>
        <div class="nc-field">
          <label>Precio</label>
          <input class="edit-input" type="text" value="${fmt(item.precio)}" inputmode="decimal"
            oninput="fmtEditPrecio(this)" onchange="editCampo(${item.id},'precio',this.value)">
        </div>
        <div class="nc-field">
          <label>Subtotal</label>
          <div class="nc-subtotal">$${fmt(item.subtotal)}</div>
        </div>
      </div>
      <div class="nc-actions">
        <button class="btn btn-sm btn-icon" onclick="cargarEdicion(${item.id})" title="Editar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>
        <button class="btn btn-sm btn-icon" onclick="eliminar(${item.id})" style="color:var(--red)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          Eliminar
        </button>
      </div>
    </div>
  `).join('');
  // Desktop table
  document.getElementById('nota-body').innerHTML=nota.map((item,i)=>`
    <tr>
      <td style="color:var(--text3);font-size:12px">${i+1}</td>
      <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${item.articulo}">${item.articulo}</td>
      <td><span class="tag">${item.talla}</span></td>
      <td><input class="edit-input" type="text" value="${fmtInt(item.cantidad)}" oninput="fmtEditCant(this)" onchange="editCampo(${item.id},'cantidad',this.value)"></td>
      <td><input class="edit-input" type="text" value="${fmt(item.precio)}" oninput="fmtEditPrecio(this)" onchange="editCampo(${item.id},'precio',this.value)"></td>
      <td style="font-weight:700;font-size:12px">$${fmt(item.subtotal)}</td>
      <td style="display:flex;gap:3px">
        <button class="btn btn-sm btn-icon" onclick="cargarEdicion(${item.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="btn btn-sm btn-icon" onclick="eliminar(${item.id})" style="color:var(--red)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
      </td>
    </tr>
  `).join('');
}

function fmtEditCant(el){fmtCantidad(el);}
function fmtEditPrecio(el){fmtPrecio(el);}

function editCampo(id,campo,val){
  const idx=nota.findIndex(i=>i.id===id);if(idx<0)return;
  nota[idx][campo]=parseFmt(val)||0;
  nota[idx].subtotal=nota[idx].cantidad*nota[idx].precio;
  updateTotales();renderNota();
}
function eliminar(id){
  nota=nota.filter(i=>i.id!==id);updateTotales();renderNota();
  document.getElementById('csv-share-box').style.display='none';
  toast('Artículo eliminado');
}
function cargarEdicion(id){
  const item=nota.find(i=>i.id===id);if(!item)return;
  switchTab('agregar');
  artSeleccionado=item.articulo;
  const lbl=document.getElementById('art-sel-label');lbl.textContent=item.articulo;lbl.classList.remove('empty');
  document.querySelectorAll('.art-item').forEach(el=>el.classList.toggle('selected',el.querySelector('span')?.textContent.trim()===item.articulo));
  tallaSeleccionada=item.talla;
  document.querySelectorAll('.talla-box').forEach(b=>b.classList.toggle('sel',b.textContent===item.talla));
  document.getElementById('cantidad').value=fmtInt(item.cantidad);
  document.getElementById('precio').value=fmt(item.precio);
  calcSub();editId=item.id;
  document.getElementById('btn-agregar').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Guardar cambios';
  showMsg('Editando — modifica y guarda','ok');
}

function generarCSV(){
  const fecha=new Date().toLocaleDateString('es-MX');
  const total=nota.reduce((s,i)=>s+i.subtotal,0);
  let csv='Fecha,Articulo,Talla,Cantidad,Precio,Subtotal,Total\n';
  nota.forEach((item,idx)=>{
    const t=idx===nota.length-1?total.toFixed(2):'';
    csv+=`"${fecha}","${item.articulo}","${item.talla}",${item.cantidad},${item.precio.toFixed(2)},${item.subtotal.toFixed(2)},${t}\n`;
  });
  return csv;
}
function exportarCSV(){
  if(!nota.length){alert('No hay artículos en la nota.');return;}
  const csv=generarCSV();
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`nota_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  URL.revokeObjectURL(url);mostrarCSVBox(csv);toast('✓ CSV descargado');
}
function compartirNota(){
  if(!nota.length){alert('No hay artículos en la nota.');return;}
  const csv=generarCSV();mostrarCSVBox(csv);
  if(navigator.share){
    const file=new File([new Blob(['\uFEFF'+csv],{type:'text/csv'})],'nota_articulos.csv',{type:'text/csv'});
    navigator.share({title:'Nota de artículos',files:[file]}).catch(()=>{});
  }
}
function mostrarCSVBox(csv){
  document.getElementById('csv-preview').value=csv;
  const box=document.getElementById('csv-share-box');box.style.display='block';
  setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function copiarCSV(){
  const ta=document.getElementById('csv-preview');ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>{
    toast('✓ Copiado');
    const btn=document.getElementById('btn-copiar'),orig=btn.innerHTML;
    btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado';
    setTimeout(()=>btn.innerHTML=orig,2000);
  }).catch(()=>document.execCommand('copy'));
}
function imprimirNota(){
  if(!nota.length){alert('No hay artículos en la nota.');return;}
  const total=nota.reduce((s,i)=>s+i.subtotal,0);
  const rows=nota.map((i,n)=>`<tr><td>${n+1}</td><td>${i.articulo}</td><td>${i.talla}</td><td>${fmtInt(i.cantidad)}</td><td>$${fmt(i.precio)}</td><td>$${fmt(i.subtotal)}</td></tr>`).join('');
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Nota</title>
  <style>body{font-family:sans-serif;font-size:13px;padding:20px;color:#111}h2{margin-bottom:4px}p{color:#666;font-size:12px;margin-bottom:16px}
  table{width:100%;border-collapse:collapse}th,td{padding:7px 8px;text-align:left;border-bottom:1px solid #ddd}th{font-size:11px;text-transform:uppercase;color:#666}
  .tr td{font-weight:700;border-top:2px solid #111;border-bottom:none}@media print{body{padding:8px}}</style>
  </head><body><h2>Nota de artículos</h2><p>${fechaStr}</p>
  <table><thead><tr><th>#</th><th>Artículo</th><th>Talla</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead>
  <tbody>${rows}<tr class="tr"><td colspan="5">Total</td><td>$${fmt(total)}</td></tr></tbody></table>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

function nuevaNota(){
  if(nota.length && !confirm('¿Crear una nueva nota? Se borrarán los artículos actuales.')) return;
  nota=[];artSeleccionado=null;tallaSeleccionada=null;editId=null;
  document.getElementById('filtro').value='';
  document.getElementById('cantidad').value='';
  document.getElementById('precio').value='';
  document.getElementById('subtotal-prev').textContent='$0.00';
  const lbl=document.getElementById('art-sel-label');
  lbl.textContent='— Ninguno seleccionado —';
  lbl.className='sel-display empty';
  document.querySelectorAll('.talla-box').forEach(b=>b.classList.remove('sel'));
  document.getElementById('csv-share-box').style.display='none';
  setBtnAgregar();showMsg('','');
  updateTotales();renderList();
  switchTab('agregar');
  toast('✓ Nueva nota iniciada');
}
function switchTab(t){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
  // desktop tabs
  document.querySelectorAll('.dtab').forEach((el,i)=>el.classList.toggle('active',(t==='agregar'&&i===0)||(t==='nota'&&i===1)));
  // mobile nav
  document.getElementById('nav-agregar').classList.toggle('active',t==='agregar');
  document.getElementById('nav-nota').classList.toggle('active',t==='nota');
  if(t==='nota')renderNota();
}

renderList();
</script>
</body>
</html>
